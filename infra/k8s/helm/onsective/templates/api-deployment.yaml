apiVersion: apps/v1
kind: Deployment
metadata:
  name: onsective-api
  labels: {{ include "onsective.labels" (dict "name" "api" "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels: {{ include "onsective.labels" (dict "name" "api" "Chart" .Chart) | nindent 8 }}
    spec:
      containers:
        - name: api
          image: {{ include "onsective.image" (dict "image" .Values.api.image "Values" .Values) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
              name: http
          envFrom:
            {{- include "onsective.envFrom" . | nindent 12 }}
          env:
            {{- range $k, $v := .Values.api.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.livenessPath }}
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
